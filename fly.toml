# Fly.io deployment — https://fly.io/docs/reference/configuration/
# Deploy: fly deploy
# Docs:  docs/DEPLOY.md

app = 'coh-ucs-tools-benmed00'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  SQLITE_PATH = '/data/app.db'
  UCS_WEBAPP_UPLOADS = '/data/uploads'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/health'

[[mounts]]
  source = 'coh_data'
  destination = '/data'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
