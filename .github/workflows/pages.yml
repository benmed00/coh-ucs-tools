# Deploy static UI to GitHub Pages on push to master.
# API remains on Fly.io (.github/workflows/fly-deploy.yml).
name: GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static frontend
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/build_static.py --api-base https://coh-ucs-tools.fly.dev --site-url https://benmed00.github.io/coh-ucs-tools --out dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
