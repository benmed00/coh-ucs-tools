name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "windows-latest"]') }}
        python-version: ${{ github.event_name == 'pull_request' && fromJSON('["3.12"]') || fromJSON('["3.12", "3.13"]') }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[web]" coverage ruff pytest
      - name: Ruff lint (optional)
        run: ruff check src tests scripts --ignore E501 || true
      - name: Run tests with coverage
        run: coverage run -m pytest tests/ -q --tb=short
      - name: Coverage report
        run: coverage report -m

  playwright:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ".[web]"
          pip install playwright
          playwright install chromium
      - name: E2E auth and API smoke
        run: python scripts/development/e2e_playwright.py
      - name: Screenshot dashboard
        run: |
          python -m uvicorn coh_ucs_tools.web.main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          python -c "
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto('http://127.0.0.1:8000/')
              page.wait_for_timeout(2000)
              page.screenshot(path='dashboard.png', full_page=True)
              browser.close()
          "
      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-screenshot
          path: |
            dashboard.png
            e2e-dashboard.png

  summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [test, playwright]
    if: always()
    steps:
      - name: Write workflow summary
        env:
          NEEDS_TEST: ${{ toJSON(needs.test) }}
          NEEDS_PLAYWRIGHT: ${{ toJSON(needs.playwright) }}
        run: |
          {
            echo "## Tests workflow summary"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| test (matrix) | ${{ needs.test.result }} |"
            echo "| playwright | ${{ needs.playwright.result }} |"
            echo ""
            if [ "${{ needs.test.result }}" = "success" ] && [ "${{ needs.playwright.result }}" = "success" ]; then
              echo "**All checks passed.** Fly Deploy runs after this workflow completes."
            else
              echo "**Some checks failed** — Fly Deploy is skipped until Tests is green."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
