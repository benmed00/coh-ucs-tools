name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements.txt coverage ruff
      - name: Ruff lint (optional)
        run: ruff check . --ignore E501 || true
      - name: Run tests with coverage
        run: coverage run -m unittest discover -s tests -v
      - name: Coverage report
        run: coverage report -m

  playwright:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium
      - name: E2E auth and API smoke
        run: python scripts/e2e_playwright.py
      - name: Screenshot dashboard
        run: |
          python -m uvicorn webapp.main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          python -c "
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto('http://127.0.0.1:8000/')
              page.wait_for_timeout(2000)
              page.screenshot(path='dashboard.png', full_page=True)
              browser.close()
          "
      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-screenshot
          path: |
            dashboard.png
            e2e-dashboard.png
