# Deploy to Fly.io after Tests pass (requires FLY_API_TOKEN repo secret).
name: Fly Deploy

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[web]"

      - name: Pre-deploy import smoke
        run: python -c "from coh_ucs_tools.web.main import app; print('import ok:', app.title)"

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: CORS smoke test (GitHub Pages → Fly API)
        run: |
          curl -sf -D /tmp/cors-headers.txt -o /dev/null \
            -H "Origin: https://benmed00.github.io" \
            https://coh-ucs-tools.fly.dev/api/health
          grep -Fi "access-control-allow-origin: https://benmed00.github.io" /tmp/cors-headers.txt
          curl -sf -D /tmp/cors-headers2.txt -o /dev/null \
            -H "Origin: https://benmed00.github.io" \
            https://coh-ucs-tools.fly.dev/api/versions
          grep -Fi "access-control-allow-origin: https://benmed00.github.io" /tmp/cors-headers2.txt
          echo "CORS OK for benmed00.github.io"
