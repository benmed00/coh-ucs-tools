<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" role="img" aria-label="Upload workflow animation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d13"/>
      <stop offset="100%" stop-color="#12140e"/>
    </linearGradient>
  </defs>
  <rect width="520" height="140" fill="url(#bg)" rx="8"/>
  <text x="20" y="24" fill="#8a9a5b" font-family="monospace" font-size="11" letter-spacing="2">UPLOAD WORKFLOW</text>
  <!-- drop zone -->
  <rect x="24" y="40" width="110" height="80" fill="#ffb64808" stroke="#8a9a5b" stroke-width="1.5" stroke-dasharray="6 4" rx="6">
    <animate attributeName="stroke" values="#8a9a5b;#ffb648;#8a9a5b" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <text x="79" y="88" text-anchor="middle" fill="#cdc294" font-family="monospace" font-size="10">.ucs</text>
  <!-- moving file -->
  <g>
    <rect x="0" y="0" width="36" height="24" rx="3" fill="#1a3a2a" stroke="#ffb648" stroke-width="1.2"/>
    <text x="18" y="16" text-anchor="middle" fill="#ffb648" font-family="monospace" font-size="8">UCS</text>
    <animateMotion path="M 160,82 C 200,82 210,62 250,62" dur="2.4s" repeatCount="indefinite"/>
  </g>
  <!-- parser -->
  <rect x="260" y="44" width="90" height="72" rx="4" fill="#202417" stroke="#3a4028"/>
  <text x="305" y="68" text-anchor="middle" fill="#ffb648" font-family="monospace" font-size="9">parser</text>
  <text x="305" y="84" text-anchor="middle" fill="#8f8c77" font-family="monospace" font-size="8">BOM Ę keys</text>
  <!-- arrow pulse -->
  <path d="M150 80h95" stroke="#9acd68" stroke-width="1.5" fill="none" stroke-dasharray="4 3">
    <animate attributeName="stroke-dashoffset" from="0" to="-14" dur="0.8s" repeatCount="indefinite"/>
  </path>
  <!-- result -->
  <rect x="370" y="44" width="126" height="72" rx="4" fill="#9acd6810" stroke="#9acd68" stroke-width="1.2"/>
  <text x="433" y="68" text-anchor="middle" fill="#9acd68" font-family="monospace" font-size="9">22680 keys</text>
  <text x="433" y="86" text-anchor="middle" fill="#8f8c77" font-family="monospace" font-size="8">0 dup Ę 0 invalid</text>
  <circle cx="480" cy="56" r="6" fill="none" stroke="#9acd68" stroke-width="1.5">
    <animate attributeName="r" values="6;9;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
