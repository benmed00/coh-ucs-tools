<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" role="img" aria-label="Merge workflow animation">
  <rect width="520" height="140" fill="#12140e" rx="8"/>
  <text x="20" y="24" fill="#8a9a5b" font-family="monospace" font-size="11" letter-spacing="2">MERGE WORKFLOW</text>
  <rect x="30" y="48" width="100" height="64" rx="4" fill="#1a3a2a" stroke="#ffb648" stroke-width="1.2"/>
  <text x="80" y="76" text-anchor="middle" fill="#ffb648" font-family="monospace" font-size="9">target EN</text>
  <text x="80" y="94" text-anchor="middle" fill="#8f8c77" font-family="monospace" font-size="8">preserved</text>
  <rect x="150" y="48" width="100" height="64" rx="4" fill="#1a3a2a" stroke="#8a9a5b"/>
  <text x="200" y="76" text-anchor="middle" fill="#cdc294" font-family="monospace" font-size="9">source RU</text>
  <text x="200" y="94" text-anchor="middle" fill="#8f8c77" font-family="monospace" font-size="8">extra ids</text>
