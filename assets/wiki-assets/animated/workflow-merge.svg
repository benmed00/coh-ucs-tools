  </rect>
  <text x="405" y="72" text-anchor="middle" fill="#9acd68" font-family="monospace" font-size="9">merged.ucs</text>
  <text x="405" y="90" text-anchor="middle" fill="#8f8c77" font-family="monospace" font-size="8">sorted · UTF-16-LE</text>
